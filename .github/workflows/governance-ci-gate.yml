name: Governance CI Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare app env
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite
          php -r "$path = realpath('database/database.sqlite'); $env = file_get_contents('.env'); $env = preg_replace('/^DB_CONNECTION=.*/m', 'DB_CONNECTION=sqlite', $env); $env = preg_replace('/^DB_DATABASE=.*/m', 'DB_DATABASE=' . str_replace('\\\\', '/', $path), $env); file_put_contents('.env', $env);"

      - name: Prepare smoke database
        run: |
          php artisan migrate --force
          php artisan app:bootstrap-local --email=admin@akubook.com --password=password

      - name: Install Node dependencies
        run: npm ci

      - name: Config validation
        id: config_validation
        run: composer validate --strict

      - name: Backend tests
        id: backend_tests
        run: composer test

      - name: Migration dependency guard
        id: migration_guard
        run: php artisan app:verify-migration-dependencies

      - name: Query plan guardrail
        id: query_plan_guard
        run: php artisan app:guard-query-plan

      - name: Frontend build
        id: frontend_build
        run: npm run build

      - name: Install Playwright browser
        id: playwright_install
        run: npx playwright install --with-deps chromium

      - name: UI smoke test
        id: ui_smoke
        env:
          E2E_EMAIL: admin@akubook.com
          E2E_PASSWORD: password
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000
        run: npm run smoke:ui

      - name: Gate summary
        if: always()
        run: |
          {
            echo "## Governance CI Gate";
            echo "- Config validation: ${{ steps.config_validation.outcome || 'completed' }}";
            echo "- Backend tests: ${{ steps.backend_tests.outcome || 'completed' }}";
            echo "- Migration dependency guard: ${{ steps.migration_guard.outcome || 'completed' }}";
            echo "- Query plan guardrail: ${{ steps.query_plan_guard.outcome || 'completed' }}";
            echo "- Frontend build: ${{ steps.frontend_build.outcome || 'completed' }}";
            echo "- Playwright install: ${{ steps.playwright_install.outcome || 'completed' }}";
            echo "- UI smoke: ${{ steps.ui_smoke.outcome || 'completed' }}";
          } >> $GITHUB_STEP_SUMMARY
